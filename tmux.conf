# RubyLLM Dark tmux theme
set -g status-style "bg=default,fg=#cebeb5"
set -g status-left "#[fg=#171315,bg=#b30000,bold] #S #[bg=default] "
set -g status-right "#[fg=#b30000]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#4a3b42]#h "
set -g window-status-format "#[fg=#4a3b42] #I:#W "
set -g window-status-current-format "#[fg=#b30000,bold] #I:#W "
setw -g pane-border-style "fg=#4a3b42"
setw -g pane-active-border-style "fg=#b30000"
set -g message-style "bg=default,fg=#b30000"
set -g message-command-style "bg=default,fg=#b30000"
set -g mode-style "bg=#b30000,fg=#171315"
setw -g clock-mode-colour "#b30000"

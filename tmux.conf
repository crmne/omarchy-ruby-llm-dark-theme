# RubyLLM Dark tmux theme
set -g status-style "bg=default,fg=#cebeb5"
set -g status-left "#[fg=#171315,bg=#ff5a4f,bold] #S #[bg=default] "
set -g status-right "#[fg=#ff5a4f]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#4a3b42]#h "
set -g window-status-format "#[fg=#4a3b42] #I:#W "
set -g window-status-current-format "#[fg=#ff5a4f,bold] #I:#W "
setw -g pane-border-style "fg=#4a3b42"
setw -g pane-active-border-style "fg=#ff5a4f"
set -g message-style "bg=default,fg=#ff5a4f"
set -g message-command-style "bg=default,fg=#ff5a4f"
set -g mode-style "bg=#ff5a4f,fg=#171315"
setw -g clock-mode-colour "#ff5a4f"
